name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js and pnpm
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
          install-pnpm: true # 确保 pnpm 依然被安装

      - name: Configure pnpm to allow unsafe build scripts globally # <-- 新增步骤
        run: echo "unsafe-perm=true" > .pnpmrc # 在仓库根目录创建 .pnpmrc 文件

      - name: Setup R2-Explorer
        env:
          R2EXPLORER_WORKER_NAME: ${{ vars.R2EXPLORER_WORKER_NAME }}
          R2EXPLORER_CONFIG: ${{ secrets.R2EXPLORER_CONFIG_SECRET }}
          R2EXPLORER_BUCKETS: ${{ vars.R2EXPLORER_BUCKETS }}
          R2EXPLORER_DOMAIN: ${{ vars.R2EXPLORER_DOMAIN }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: node packages/github-action/prepareDeploy.js
      
      - name: Install and get latest R2-Explorer version
        run: |
          cd packages/github-action
          pnpm install # 现在会读取 .pnpmrc 中的 unsafe-perm=true
          pnpm add r2-explorer@latest # 同上

      - name: Deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: "packages/github-action"
          secrets: |
            R2EXPLORER_CONFIG: ${{ secrets.R2EXPLORER_CONFIG_SECRET }}
          vars: |
            R2EXPLORER_WORKER_NAME: ${{ vars.R2EXPLORER_WORKER_NAME }}
            R2EXPLORER_BUCKETS: ${{ vars.R2EXPLORER_BUCKETS }}
            R2EXPLORER_DOMAIN: ${{ vars.R2EXPLORER_DOMAIN }}
