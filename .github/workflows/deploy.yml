name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4 # 确保使用 v4

      - name: Setup Node.js and pnpm
        uses: actions/setup-node@v4 # 确保使用 v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
          install-pnpm: true

      - name: Configure pnpm to allow unsafe build scripts via environment variable # <--- 关键新步骤
        run: echo "PNPM_CONFIG_UNSAFE_PERM=true" >> $GITHUB_ENV # 将环境变量写入 $GITHUB_ENV, 使其对后续所有步骤生效

      - name: Setup R2-Explorer
        env:
          R2EXPLORER_WORKER_NAME: ${{ vars.R2EXPLORER_WORKER_NAME }}
          R2EXPLORER_CONFIG: ${{ secrets.R2EXPLORER_CONFIG_SECRET }}
          R2EXPLORER_BUCKETS: ${{ vars.R2EXPLORER_BUCKETS }}
          R2EXPLORER_DOMAIN: ${{ vars.R2EXPLORER_DOMAIN }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: node packages/github-action/prepareDeploy.js
      
      - name: Install and get latest R2-Explorer version
        run: |
          cd packages/github-action
          pnpm install # 不再需要 --unsafe-perm，环境变量已生效
          pnpm add r2-explorer@latest # 不再需要 --unsafe-perm，环境变量已生效

      - name: Deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: "packages/github-action"
          secrets: |
            R2EXPLORER_CONFIG: ${{ secrets.R2EXPLORER_CONFIG_SECRET }}
          vars: |
            R2EXPLORER_WORKER_NAME: ${{ vars.R2EXPLORER_WORKER_NAME }}
            R2EXPLORER_BUCKETS: ${{ vars.R2EXPLORER_BUCKETS }}
            R2EXPLORER_DOMAIN: ${{ vars.R2EXPLORER_DOMAIN }}
