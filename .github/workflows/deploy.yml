name: Deploy

on:
    workflow_dispatch:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest
        name: Deploy
        steps:
            - uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9   # 或 latest
                  run_install: false

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20.x'
                  registry-url: 'https://registry.npmjs.org'
                  cache: 'pnpm'

            - name: Configure pnpm to allow unsafe build scripts via environment variable
              run: echo "PNPM_CONFIG_UNSAFE_PERM=true" >> $GITHUB_ENV # 仍然保留此步骤，以解决 ERR_PNPM_IGNORED_BUILDS 问题

            - name: Setup R2-Explorer
              env:
                  R2EXPLORER_WORKER_NAME: ${{ vars.R2EXPLORER_WORKER_NAME }}
                  R2EXPLORER_CONFIG: ${{ secrets.R2EXPLORER_CONFIG_SECRET }}
                  R2EXPLORER_BUCKETS: ${{ vars.R2EXPLORER_BUCKETS }}
                  R2EXPLORER_DOMAIN: ${{ vars.R2EXPLORER_DOMAIN }}
                  CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
              run: node packages/github-action/prepareDeploy.js

            - name: Install and get latest R2-Explorer version
              run: |
                  cd packages/github-action
                  pnpm install # 此时 pnpm 应该已经被 setup-node 安装好，且 unsafe-perm 生效
                  pnpm add r2-explorer@latest

            - name: Deploy
              uses: cloudflare/wrangler-action@v4
              with:
                  apiToken: ${{ secrets.CF_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  workingDirectory: "packages/github-action"
                  secrets: |
                      R2EXPLORER_CONFIG: ${{ secrets.R2EXPLORER_CONFIG_SECRET }}
                  vars: |
                      R2EXPLORER_WORKER_NAME: ${{ vars.R2EXPLORER_WORKER_NAME }}
                      R2EXPLORER_BUCKETS: ${{ vars.R2EXPLORER_BUCKETS }}
                      R2EXPLORER_DOMAIN: ${{ vars.R2EXPLORER_DOMAIN }}
