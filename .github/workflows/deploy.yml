name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js (without pnpm)
        uses: actions/setup-node@v4.0.3
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: false  # 暂时禁用缓存，防止污染

      - name: Install pnpm globally (✅ 确保 pnpm 在PATH中可用)
        run: |
          npm install -g pnpm
          echo "pnpm is installed globally"

      - name: Set up pnpm for unsafe perms (解决 ERR_PNPM_IGNORED_BUILDS)
        run: |
          echo "PNPM_CONFIG_UNSAFE_PERM=true" >> $GITHUB_ENV
          echo "Setting up pnpm for unsafe permissions..."

      - name: Setup R2-Explorer
        env:
          R2EXPLORER_WORKER_NAME: ${{ secrets.R2EXPLORER_WORKER_NAME }}
          R2EXPLORER_CONFIG: ${{ secrets.R2EXPLORER_CONFIG_SECRET }}
          R2EXPLORER_BUCKETS: ${{ secrets.R2EXPLORER_BUCKETS }}
          R2EXPLORER_DOMAIN: ${{ secrets.R2EXPLORER_DOMAIN }}  # ✅ 确保使用 secrets
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: node packages/github-action/prepareDeploy.js

      - name: Install R2-Explorer
        run: |
          cd packages/github-action
          pnpm install
          pnpm add r2-explorer@latest

      - name: Deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: "packages/github-action"
          secrets: |
            R2EXPLORER_CONFIG: ${{ secrets.R2EXPLORER_CONFIG_SECRET }}
          vars: |
            R2EXPLORER_WORKER_NAME: ${{ secrets.R2EXPLORER_WORKER_NAME }}
            R2EXPLORER_BUCKETS: ${{ secrets.R2EXPLORER_BUCKETS }}
            R2EXPLORER_DOMAIN: ${{ secrets.R2EXPLORER_DOMAIN }}  # ✅ 确保正确使用 secrets
