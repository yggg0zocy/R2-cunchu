name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      # 调试：检查 secret 是否存在
      - name: Verify secret exists
        run: |
          if [ -z "${{ secrets.R2EXPLORER_CONFIG_SECRET }}" ]; then
            echo "::error::R2EXPLORER_CONFIG_SECRET is empty or not set"
            exit 1
          else
            echo "✅ Secret exists"
          fi

      - name: Setup R2-Explorer
        env:
          R2EXPLORER_WORKER_NAME: ${{ vars.R2EXPLORER_WORKER_NAME }}
          R2EXPLORER_CONFIG: '${{ secrets.R2EXPLORER_CONFIG_SECRET }}'   # 单引号包裹
          R2EXPLORER_BUCKETS: ${{ vars.R2EXPLORER_BUCKETS }}
          R2EXPLORER_DOMAIN: ${{ vars.R2EXPLORER_DOMAIN }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: node packages/github-action/prepareDeploy.js
      
      - name: Get latest version
        run: |
          cd packages/github-action
          npm install
          npm install --save r2-explorer@latest

      # 方案A：让 wrangler-action 处理 secret（如果之前失败，改用下方方案B）
      - name: Deploy with Wrangler Action
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: "packages/github-action"
          secrets: |
            R2EXPLORER_CONFIG: ${{ secrets.R2EXPLORER_CONFIG_SECRET }}
          vars: |
            R2EXPLORER_WORKER_NAME: ${{ vars.R2EXPLORER_WORKER_NAME }}
            R2EXPLORER_BUCKETS: ${{ vars.R2EXPLORER_BUCKETS }}
            R2EXPLORER_DOMAIN: ${{ vars.R2EXPLORER_DOMAIN }}

      # 方案B（备选）：手动上传 secret + 部署（如果方案A仍然报错）
      # - name: Upload secret manually
      #   env:
      #     CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      #     CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      #   run: |
      #     cd packages/github-action
      #     echo "${{ secrets.R2EXPLORER_CONFIG_SECRET }}" | wrangler secret put R2EXPLORER_CONFIG
