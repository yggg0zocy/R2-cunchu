name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v6
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
           - name: Setup R2-Explorer
        env:
          R2EXPLORER_WORKER_NAME: ${{ vars.R2EXPLORER_WORKER_NAME }}
          R2EXPLORER_CONFIG: ${{ secrets.R2EXPLORER_CONFIG_JSON_SECRET }}
          R2EXPLORER_BUCKETS: ${{ vars.R2EXPLORER_BUCKETS }}
          R2EXPLORER_DOMAIN: ${{ vars.R2EXPLORER_DOMAIN }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          echo "Checking R2EXPLORER_CONFIG..."
          # 这一行会打印 R2EXPLORER_CONFIG 的长度，如果为0则表示为空
          echo "R2EXPLORER_CONFIG length: $(echo '${{ secrets.R2EXPLORER_CONFIG_JSON_SECRET }}' | wc -c)"
          # 这一行会尝试打印 R2EXPLORER_CONFIG 的值，GitHub Actions 会自动将其掩码为 ***
          echo "R2EXPLORER_CONFIG value (masked): ${{ secrets.R2EXPLORER_CONFIG_JSON_SECRET }}"
          node packages/github-action/prepareDeploy.js
      - name: Get latest version
        run: cd packages/github-action && npm install && npm install --save r2-explorer@latest
      - name: Deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }} # 确保这个也是 GitHub Secret
          workingDirectory: "packages/github-action"
          # ****** 关键改动在这里 ******
          # 这会将 R2EXPLORER_CONFIG 作为 Cloudflare Worker 的 Secret 部署
          secrets: |
            R2EXPLORER_CONFIG: ${{ secrets.R2EXPLORER_CONFIG_JSON_SECRET }}
          # 这些会将其他非敏感配置作为 Cloudflare Worker 的环境变量部署
          vars: |
            R2EXPLORER_WORKER_NAME: ${{ vars.R2EXPLORER_WORKER_NAME }}
            R2EXPLORER_BUCKETS: ${{ vars.R2EXPLORER_BUCKETS }}
            R2EXPLORER_DOMAIN: ${{ vars.R2EXPLORER_DOMAIN }}
